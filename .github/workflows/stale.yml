name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 30 days. If it's still relevant, comment to keep it open, or `/assign` it if you're working on it. Otherwise it'll be closed in 7 days.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if it's still relevant.
          exempt-issue-labels: 'status: blocked'
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 14 days. Push a commit or comment if you're still working on it, otherwise it'll be closed in 7 days.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if you pick it back up.
          exempt-pr-labels: 'status: blocked'